<!DOCTYPE html>
<html>
<head>
    <title>Form Example</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>Linear Search</h1>
<form action="/linearsearch">
    <label for="linearlist">List:</label><br>
    <input type="text" id="linearlist" name="list" value="1,4,7,9,11"><br><br>
    <label for="linearvalue">Value:</label><br>
    <input type="number" id="linearvalue" name="value" value="7"><br><br>
    <input type="button" value="Submit" onclick="loadGetMsg()">
</form>
<div id="getrespmsg"></div>
<script>
    function loadGetMsg() {
    let listVar = document.getElementById("linearlist").value;
    let valueVar = document.getElementById("linearvalue").value;
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
    document.getElementById("getrespmsg").innerHTML =
    this.responseText;
    }
    xhttp.open("GET", "/linearsearch?list=" + listVar + "&value=" + valueVar);
    xhttp.send();
    }
</script>
<h1>Binary Search</h1>
<form action="/binarysearch">
    <label for="binarylist">Sorted List:</label><br>
    <input type="text" id="binarylist" name="list" value="1,3,5,7,9,11"><br><br>
    <label for="binaryvalue">Value:</label><br>
    <input type="number" id="binaryvalue" name="value" value="7"><br><br>
    <input type="button" value="Submit" onclick="loadPostMsg()">
</form>
<div id="postrespmsg"></div>
<script>
    function loadPostMsg(){
    let listVar = document.getElementById("binarylist").value;
    let valueVar = document.getElementById("binaryvalue").value;
    let url = "/binarysearch?list=" + listVar + "&value=" + valueVar;
    fetch (url)
    .then(x => x.text())
    .then(y => document.getElementById("postrespmsg").innerHTML = y);
    }
</script>
</body>
</html>
